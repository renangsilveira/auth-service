ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.renangsilveira.ApplicationKt.module ]
    }
}

database {
    host = "localhost"
    host = ${?DB_HOST}
    port = 5432
    port = ${?DB_PORT}
    name = "auth_service"
    name = ${?DB_NAME}
    user = "auth_user"
    user = ${?DB_USER}
    password = "auth_pass"
    password = ${?DB_PASSWORD}
}

redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
}

jwt {
    secret = "dev-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "auth-service"
    audience = "auth-service-users"
    accessTokenExpirationMs = 900000
    refreshTokenExpirationMs = 604800000
}
